[colors]
draw_bold_text_with_bright_colors = false
transparent_background_colors = true

[colors.primary]
background = "#282c34"
foreground = "#abb2bf"

[colors.normal]
black="#3f4451"
white="#d7dae0"
red="#e05561"
green="#8cc265"
yellow="#d18f52"
blue="#4aa5f0"
magenta="#c162de"
cyan="#42b3c2"

[colors.bright]
black="#4f5666"
white="#e6e6e6"
red="#ff616e"
green="#a5e075"
yellow="#f0a45d"
blue="#4dc4ff"
magenta="#de73ff"
cyan="#4cd1e0"

[font]
size = 18

[font.bold]
family = "ComicShannsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "ComicShannsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "ComicShannsMono Nerd Font"
style = "Italic"

[font.normal]
family = "ComicShannsMono Nerd Font"
style = "Regular"

[[keyboard.bindings]]
chars = "\u001F"
key = "Slash"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001C"
key = "Semicolon"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001E"
key = "Comma"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001A"
key = "Period"
mods = "Control"

[[keyboard.bindings]]
key = "M"
mods = "Command"
action = "ToggleMaximized"

[[keyboard.bindings]]
key = "C"
mods = "Control | Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control | Shift"
action = "Paste"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[window]

# Window dimensions
dimensions = { columns = 0, lines = 0 }  # Default: columns = 0, lines = 0

# Window startup position
position = "None"  # Default: "None"

# Padding
padding = { x = 5, y = 30 }  # Default: x = 0, y = 0

# Dynamic padding
dynamic_padding = true  # Default: false

# Window decorations
# decorations = "None"  # Default: "Full"
decorations = "Transparent"  # Default: "Full"

# Opacity
opacity = 0.9  # Default: 1.0

# Blur (macOS/KDE Wayland only)
blur = true  # Default: false

# Startup mode
startup_mode = "Windowed"  # Default: "Windowed"

# Window title
title = "Alacritty"  # Default: "Alacritty"

# Dynamic title
dynamic_title = true  # Default: true

# Window class (Linux/BSD only)
class = { instance = "Alacritty", general = "Alacritty" }  # Default: instance = "Alacritty", general = "Alacritty"

# Decorations theme variant
decorations_theme_variant = "Dark"  # Default: "None"

# Resize increments
resize_increments = false  # Default: false
